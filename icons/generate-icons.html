<!-- Open this file in a browser, right-click each canvas to save as PNG -->
<!DOCTYPE html>
<html>
<body style="background:#111;padding:40px;display:flex;gap:40px;flex-wrap:wrap">
<script>
[192, 512].forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size / 512;

  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#3b82f6');
  grad.addColorStop(1, '#8b5cf6');

  // Rounded rect
  const r = 96 * s;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fillStyle = grad;
  ctx.fill();

  // Magnifying glass circle
  ctx.beginPath();
  ctx.arc(256 * s, 240 * s, 100 * s, 0, Math.PI * 2);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 28 * s;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Handle
  ctx.beginPath();
  ctx.moveTo(330 * s, 314 * s);
  ctx.lineTo(400 * s, 384 * s);
  ctx.stroke();

  // Bars inside lens
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.roundRect(216 * s, 200 * s, 80 * s, 16 * s, 8 * s);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.roundRect(216 * s, 228 * s, 60 * s, 16 * s, 8 * s);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.roundRect(216 * s, 256 * s, 40 * s, 16 * s, 8 * s);
  ctx.fill();

  // Download link
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `icon-${size}.png`;
  link.textContent = `Download ${size}x${size}`;
  link.style.cssText = 'color:white;display:block;text-align:center;margin-top:8px;font-family:sans-serif';

  const wrap = document.createElement('div');
  wrap.appendChild(canvas);
  wrap.appendChild(link);
  document.body.appendChild(wrap);
});
</script>
</body>
</html>
